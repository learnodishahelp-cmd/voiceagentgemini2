<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>GrammarMaster AI • English tutor</title>
  <!-- Production-ready single-page app: HTML + CSS + JS -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1e3a8a;
      --primary-light: #2563eb;
      --primary-soft: #dbeafe;
      --white: #ffffff;
      --gray-50: #f8fafc;
      --gray-100: #f1f5f9;
      --gray-200: #e2e8f0;
      --gray-600: #475569;
      --gray-800: #1e293b;
      --success: #0f766e;
      --warning: #b45309;
      --error: #b91c1c;
      --radius: 1.25rem;
      --radius-sm: 0.75rem;
      --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.02);
      --font-sans: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Roboto', sans-serif;
    }

    body {
      font-family: var(--font-sans);
      background: linear-gradient(145deg, #eff6ff 0%, #f0f9ff 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0.75rem;
      margin: 0;
    }

    .app-container {
      width: min(100%, 720px);
      max-height: 95vh;
      background: var(--white);
      border-radius: 2rem;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      color: white;
      padding: 1.25rem 1.5rem 1rem;
      border-bottom-left-radius: 2rem;
      border-bottom-right-radius: 2rem;
    }

    .header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .subtitle {
      font-size: 0.95rem;
      opacity: 0.9;
      margin-top: 0.2rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    /* Controls bar */
    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.8rem 1rem;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
    }

    .lang-select {
      padding: 0.6rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid var(--gray-200);
      background: white;
      font-weight: 500;
      font-size: 0.9rem;
      color: var(--gray-800);
      flex: 1 1 auto;
      min-width: 110px;
      cursor: pointer;
    }

    .btn {
      background: white;
      border: 1px solid var(--gray-200);
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      cursor: pointer;
      transition: all 0.2s ease;
      background: white;
      color: var(--gray-800);
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .btn-primary {
      background: var(--primary-light);
      border-color: var(--primary-light);
      color: white;
      box-shadow: 0 4px 8px rgba(37, 99, 235, 0.25);
    }

    .btn-primary:hover {
      background: var(--primary);
    }

    .btn-outline {
      background: transparent;
      border-color: var(--gray-300);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    /* Status indicator */
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      background: var(--gray-100);
      color: var(--gray-600);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-weight: 500;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ca3af;
    }

    .dot.listening { background: #f59e0b; animation: pulse 1s infinite; }
    .dot.thinking { background: #6366f1; animation: pulse 1s infinite; }
    .dot.speaking { background: #10b981; animation: pulse 1s infinite; }
    .dot.error { background: #ef4444; }
    .dot.ready { background: #3b82f6; }

    @keyframes pulse { 0% { opacity: 0.6; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1.2); } 100% { opacity: 0.6; transform: scale(0.9); } }

    /* Chat area */
    .chat-history {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 1rem;
      background: var(--white);
      display: flex;
      flex-direction: column;
      gap: 1rem;
      scroll-behavior: smooth;
    }

    .message {
      max-width: 85%;
      padding: 0.9rem 1.2rem;
      border-radius: 1.5rem;
      line-height: 1.5;
      font-size: 0.95rem;
      word-wrap: break-word;
      position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.03);
    }

    .user-msg {
      align-self: flex-end;
      background: var(--primary-soft);
      color: #0f172a;
      border-bottom-right-radius: 0.4rem;
    }

    .ai-msg {
      align-self: flex-start;
      background: #f1f5f9;
      color: #0f172a;
      border-bottom-left-radius: 0.4rem;
      white-space: pre-wrap;
    }

    .copy-btn {
      background: none;
      border: none;
      cursor: pointer;
      margin-left: 0.5rem;
      font-size: 1rem;
      opacity: 0.7;
      float: right;
    }

    /* Input area */
    .input-area {
      padding: 0.8rem 1rem 1rem;
      background: var(--white);
      border-top: 1px solid var(--gray-200);
    }

    textarea {
      width: 100%;
      border: 1px solid var(--gray-200);
      border-radius: 1.2rem;
      padding: 0.9rem;
      font-size: 1rem;
      font-family: inherit;
      resize: none;
      margin-bottom: 0.6rem;
      background: var(--gray-50);
    }

    .meta-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: var(--gray-600);
      margin-bottom: 0.6rem;
      padding: 0 0.2rem;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }

    @media (max-width: 480px) {
      .btn {
        padding: 0.5rem 0.8rem;
        font-size: 0.8rem;
      }
      .header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <header class="header">
    <h1>📘 GrammarMaster AI</h1>
    <div class="subtitle">🗣️ Speak, Learn and Improve English</div>
  </header>

  <div class="controls">
    <select id="languageSelect" class="lang-select">
      <option value="en-US">🇬🇧 English</option>
      <option value="hi-IN">🇮🇳 हिन्दी (Hindi)</option>
      <option value="or-IN">🌾 ଓଡ଼ିଆ (Odia)</option>
    </select>
    <button id="micBtn" class="btn" title="Voice input (Speech-to-Text)">🎤 Speak</button>
    <button id="askBtn" class="btn btn-primary">✨ Ask AI</button>
    <button id="stopSpeakBtn" class="btn btn-outline">🔇 Stop Voice</button>
    <button id="clearChatBtn" class="btn btn-outline">🗑️ Clear</button>
  </div>

  <div class="status-row">
    <span class="status-badge"><span id="statusDot" class="dot ready"></span> <span id="statusText">Ready</span></span>
    <span id="wordCharCount">Words: 0 | Chars: 0</span>
  </div>

  <div id="chatContainer" class="chat-history">
    <!-- dynamic messages -->
  </div>

  <div class="input-area">
    <textarea id="userInput" rows="3" placeholder="Type your sentence or grammar question... (Odia/Hindi/English welcome)"></textarea>
    <div class="meta-info">
      <span id="liveWordCount">Words: 0</span>
      <span id="liveCharCount">Chars: 0</span>
    </div>
    <div class="action-row">
      <button id="mobileAskBtn" class="btn btn-primary" style="flex:1;">✨ Ask GrammarMaster</button>
    </div>
  </div>
</div>

<script>
  (function() {
    // ---------- CONFIG ----------
    const API_KEY = "YOUR_GEMINI_API_KEY"; // <-- Replace with your actual Gemini API key
    // Using the correct Gemini API v1 endpoint
    const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-2.0-flash:generateContent`;
    
    // ---------- DOM ELEMENTS ----------
    const langSelect = document.getElementById('languageSelect');
    const micBtn = document.getElementById('micBtn');
    const askBtn = document.getElementById('askBtn');
    const stopSpeakBtn = document.getElementById('stopSpeakBtn');
    const clearChatBtn = document.getElementById('clearChatBtn');
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const wordCharCount = document.getElementById('wordCharCount');
    const liveWordCount = document.getElementById('liveWordCount');
    const liveCharCount = document.getElementById('liveCharCount');
    const mobileAskBtn = document.getElementById('mobileAskBtn');

    // ---------- STATE ----------
    let chatHistory = [];           // { role: 'user'|'ai', text: string }
    let currentStatus = 'ready';   // ready, listening, thinking, speaking, error
    let speechSynth = window.speechSynthesis;
    let speakingUtterance = null;
    let recognition = null;
    let isRecognizing = false;

    // ---------- SYSTEM PROMPT ----------
    const SYSTEM_PROMPT = `You are GrammarMaster, an expert English Grammar Teacher. 
Your goals: Teach grammar clearly, correct mistakes, improve vocabulary, writing, speaking. Prepare students for exams. Adapt for beginners.

CRITICAL RULES:
- User may write in Odia, Hindi, or English. Understand all.
- Grammar teaching primarily teaches English.
- Explanations MUST be given in the language selected by the user (Odia, Hindi, or English). If Odia selected, explain in Odia. If Hindi, in Hindi. If English, in English.
- When correcting sentences, show: Original Sentence, Corrected Sentence, Explanation (up to 5 lines), Grammar Rule, Why correct, 3 similar examples, Common mistakes, Memory tip.
- For grammar questions: Definition, Rule, Examples, Practice exercise.
- For vocabulary: Meaning, Pronunciation, Synonyms, Antonyms, Example sentences.
- For spoken English: Natural conversational, Formal, Informal versions.
- Always finish with: "Practice Challenge:" and a short exercise.
Keep responses structured, friendly, and educational.`;

    // ---------- HELPER: UPDATE STATUS ----------
    function setStatus(status, text = '') {
      currentStatus = status;
      statusDot.className = 'dot ' + status;
      statusText.textContent = text || status.charAt(0).toUpperCase() + status.slice(1);
    }

    // ---------- LOCAL STORAGE ----------
    function saveChatToStorage() {
      try {
        localStorage.setItem('grammarmaster_chat', JSON.stringify(chatHistory));
      } catch (e) {}
    }

    function loadChatFromStorage() {
      try {
        const stored = localStorage.getItem('grammarmaster_chat');
        if (stored) {
          chatHistory = JSON.parse(stored);
        }
      } catch (e) {
        chatHistory = [];
      }
      if (!chatHistory || chatHistory.length === 0) {
        chatHistory = [];
      }
    }

    // ---------- RENDER CHAT ----------
    function renderChat() {
      if (!chatContainer) return;
      chatContainer.innerHTML = '';
      chatHistory.forEach((msg, index) => {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${msg.role === 'user' ? 'user-msg' : 'ai-msg'}`;
        
        const textSpan = document.createElement('span');
        textSpan.textContent = msg.text;
        msgDiv.appendChild(textSpan);
        
        if (msg.role === 'ai') {
          const copyBtn = document.createElement('button');
          copyBtn.className = 'copy-btn';
          copyBtn.innerHTML = '📋';
          copyBtn.title = 'Copy response';
          copyBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            navigator.clipboard.writeText(msg.text).then(() => {
              copyBtn.innerHTML = '✅';
              setTimeout(() => { copyBtn.innerHTML = '📋'; }, 1200);
            });
          });
          msgDiv.appendChild(copyBtn);
        }
        chatContainer.appendChild(msgDiv);
      });
      autoScroll();
    }

    function autoScroll() {
      if (chatContainer) {
        chatContainer.scrollTop = chatContainer.scrollHeight;
      }
    }

    function addMessage(role, text) {
      chatHistory.push({ role, text });
      saveChatToStorage();
      renderChat();
    }

    // ---------- COUNT HELPER ----------
    function updateCounts() {
      const text = userInput.value.trim();
      const words = text.length ? text.split(/\s+/).filter(w => w.length > 0).length : 0;
      const chars = text.length;
      liveWordCount.textContent = `Words: ${words}`;
      liveCharCount.textContent = `Chars: ${chars}`;
      wordCharCount.textContent = `Words: ${words} | Chars: ${chars}`;
    }

    userInput.addEventListener('input', updateCounts);

    // ---------- CLEAR CHAT ----------
    function clearChat() {
      chatHistory = [];
      saveChatToStorage();
      renderChat();
    }

    // ---------- STOP SPEAKING ----------
    function stopSpeaking() {
      if (speechSynth.speaking || speechSynth.pending) {
        speechSynth.cancel();
      }
      if (currentStatus === 'speaking') {
        setStatus('ready', 'Ready');
      }
    }

    // ---------- TEXT TO SPEECH ----------
    function speakText(text, langCode) {
      stopSpeaking();
      if (!text || text.length === 0) return;
      // Map selected language to speech synthesis language
      let speechLang = 'en-US';
      if (langCode === 'hi-IN') speechLang = 'hi-IN';
      else if (langCode === 'or-IN') speechLang = 'or-IN'; // Odia may not be fully supported, fallback handled
      else speechLang = 'en-US';

      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = speechLang;
      utterance.rate = 0.95;
      utterance.pitch = 1.0;
      
      utterance.onstart = () => {
        setStatus('speaking', 'Speaking...');
      };
      utterance.onend = () => {
        setStatus('ready', 'Ready');
        speakingUtterance = null;
      };
      utterance.onerror = (e) => {
        console.warn('Speech error:', e);
        setStatus('ready', 'Ready');
        speakingUtterance = null;
      };
      speakingUtterance = utterance;
      speechSynth.speak(utterance);
    }

    // ---------- GEMINI API CALL (FIXED) ----------
    async function callGemini(promptText, selectedLang) {
      // Validate API key first
      if (!API_KEY || API_KEY === "AQ.Ab8RN6IUXmC1VtNHpbGyYM0jP_gVDYO9Ynl2jAoyp0gTttPYZA") {
        throw new Error("Please replace 'YOUR_GEMINI_API_KEY' with your actual Gemini API key in the code.");
      }

      // Build messages with system prompt and language instruction
      const languageName = selectedLang === 'hi-IN' ? 'Hindi' : (selectedLang === 'or-IN' ? 'Odia' : 'English');
      const fullPrompt = `${SYSTEM_PROMPT}\n\nCurrent selected language for explanation: ${languageName}. User message: "${promptText}"`;
      
      const requestBody = {
        contents: [
          {
            parts: [{ text: fullPrompt }]
          }
        ],
        generationConfig: {
          temperature: 0.7,
          maxOutputTokens: 800,
        }
      };

      // Use fetch with API key as query parameter (correct method for Gemini API)
      const response = await fetch(`${GEMINI_API_URL}?key=${API_KEY}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(requestBody)
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        const errorMessage = errorData.error?.message || `HTTP error ${response.status}`;
        throw new Error(errorMessage);
      }

      const data = await response.json();
      const candidateText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
      if (!candidateText) {
        throw new Error('No response generated. Please try again.');
      }
      return candidateText.trim();
    }

    // ---------- HANDLE ASK AI ----------
    async function handleAskAI() {
      const query = userInput.value.trim();
      if (!query) {
        alert('Please type a sentence or question.');
        return;
      }
      const selectedLang = langSelect.value;
      
      addMessage('user', query);
      userInput.value = '';
      updateCounts();
      
      setStatus('thinking', 'Thinking...');
      try {
        const aiResponse = await callGemini(query, selectedLang);
        addMessage('ai', aiResponse);
        setStatus('ready', 'Ready');
      } catch (error) {
        console.error('Gemini API error:', error);
        let errorMsg = error.message;
        // Provide more user-friendly error messages
        if (errorMsg.includes('API key not valid')) {
          errorMsg = 'Invalid API key. Please check your Gemini API key and try again.';
        } else if (errorMsg.includes('404')) {
          errorMsg = 'API endpoint not found. Please check the model name.';
        } else if (errorMsg.includes('429')) {
          errorMsg = 'Too many requests. Please wait a moment and try again.';
        }
        addMessage('ai', `⚠️ Error: ${errorMsg}`);
        setStatus('error', 'Error');
        setTimeout(() => setStatus('ready', 'Ready'), 3000);
      }
    }

    // ---------- SPEECH TO TEXT (Web Speech API) ----------
    function setupSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert('Speech recognition not supported in this browser. Please use Chrome or Edge.');
        micBtn.disabled = true;
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isRecognizing = true;
        setStatus('listening', 'Listening...');
        micBtn.textContent = '🔴 Listening';
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        userInput.value = transcript;
        updateCounts();
        stopRecognition();
      };

      recognition.onerror = (event) => {
        console.error('Speech error:', event.error);
        setStatus('error', 'Voice error');
        stopRecognition();
        setTimeout(() => setStatus('ready', 'Ready'), 2000);
      };

      recognition.onend = () => {
        stopRecognition();
      };
    }

    function startRecognition() {
      if (!recognition) {
        setupSpeechRecognition();
      }
      if (!recognition) return;
      if (isRecognizing) {
        stopRecognition();
        return;
      }
      const lang = langSelect.value;
      recognition.lang = lang;
      try {
        recognition.start();
      } catch (e) {
        console.warn('Recognition start error', e);
      }
    }

    function stopRecognition() {
      if (recognition && isRecognizing) {
        try { recognition.stop(); } catch (e) {}
      }
      isRecognizing = false;
      micBtn.textContent = '🎤 Speak';
      if (currentStatus === 'listening') setStatus('ready', 'Ready');
    }

    // ---------- EVENT LISTENERS ----------
    micBtn.addEventListener('click', startRecognition);
    
    askBtn.addEventListener('click', handleAskAI);
    mobileAskBtn.addEventListener('click', handleAskAI);
    
    stopSpeakBtn.addEventListener('click', stopSpeaking);
    
    clearChatBtn.addEventListener('click', () => {
      if (confirm('Clear all chat history?')) {
        clearChat();
      }
    });

    // Allow Enter to send (Shift+Enter new line)
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleAskAI();
      }
    });

    // Speak AI message on double-click
    chatContainer.addEventListener('dblclick', (e) => {
      const msgDiv = e.target.closest('.ai-msg');
      if (msgDiv) {
        const text = msgDiv.querySelector('span')?.textContent || '';
        if (text) {
          const selectedLang = langSelect.value;
          speakText(text, selectedLang);
        }
      }
    });

    // Initialize
    loadChatFromStorage();
    renderChat();
    updateCounts();
    setStatus('ready', 'Ready');
    setupSpeechRecognition(); // pre-setup

    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
      stopSpeaking();
      if (recognition && isRecognizing) recognition.stop();
    });

    // Validate API key on load and show warning if not set
    if (API_KEY === "YOUR_GEMINI_API_KEY") {
      console.warn('⚠️ Please replace YOUR_GEMINI_API_KEY with your actual Gemini API key');
      addMessage('ai', '👋 Welcome to GrammarMaster AI! Please replace "YOUR_GEMINI_API_KEY" in the code with your actual Gemini API key to get started. You can get a free API key from https://aistudio.google.com/apikey');
    }

  })();
</script>
</body>
</html>
